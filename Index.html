<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Makhraj Huruf Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;}
        .interactive { pointer-events: auto; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Besarkan tulisan Arab supaya jelas */
        .arabic-text { font-family: "Amiri", serif; font-size: 2.5rem; line-height: 3rem; font-weight: bold; }
    </style>
</head>
<body class="text-white">

    <div id="canvas-container"></div>

    <div id="ui-layer" class="p-4 md:p-8">
        <div class="glass-panel p-4 rounded-2xl shadow-lg max-w-2xl mx-auto interactive text-center w-full mt-4">
            <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                Visualisasi 3D: 5 Tempat Makhraj Huruf
            </h1>
            <p class="text-slate-300 text-sm mt-2">Klik bebola bercahaya atau butang di bawah.</p>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-end gap-4 pb-4">
            <div class="glass-panel p-4 rounded-xl flex flex-col gap-2 interactive w-full md:w-64">
                <h3 class="font-semibold text-emerald-400 border-b border-slate-600 pb-2 mb-2">Pilih Tempat Makhraj:</h3>
                <button onclick="selectMakhraj('jawf')" class="text-left px-3 py-2 rounded bg-slate-800 hover:bg-blue-600 transition-all border-l-4 border-blue-400">1. Al-Jawf (Rongga)</button>
                <button onclick="selectMakhraj('halq')" class="text-left px-3 py-2 rounded bg-slate-800 hover:bg-red-600 transition-all border-l-4 border-red-400">2. Al-Halq (Kerongkong)</button>
                <button onclick="selectMakhraj('lisan')" class="text-left px-3 py-2 rounded bg-slate-800 hover:bg-green-600 transition-all border-l-4 border-green-400">3. Al-Lisan (Lidah)</button>
                <button onclick="selectMakhraj('syafatain')" class="text-left px-3 py-2 rounded bg-slate-800 hover:bg-yellow-600 transition-all border-l-4 border-yellow-400">4. Ash-Syafatain (Bibir)</button>
                <button onclick="selectMakhraj('khaisyum')" class="text-left px-3 py-2 rounded bg-slate-800 hover:bg-purple-600 transition-all border-l-4 border-purple-400">5. Al-Khaisyum (Hidung)</button>
            </div>

            <div id="info-panel" class="glass-panel p-6 rounded-2xl interactive w-full md:max-w-md hidden transform transition-all duration-300">
                <div class="flex items-center gap-3 mb-4">
                    <div id="info-color" class="w-6 h-6 rounded-full shadow-lg"></div>
                    <h2 id="info-title" class="text-xl md:text-2xl font-bold"></h2>
                </div>
                <div class="bg-slate-900/80 rounded-lg p-6 mb-4 text-center border border-slate-700">
                    <p id="info-letters" class="arabic-text text-emerald-300"></p>
                </div>
                <p id="info-desc" class="text-slate-300 text-sm leading-relaxed"></p>
                <button onclick="document.getElementById('info-panel').classList.add('hidden')" class="mt-4 w-full bg-slate-700 py-1 rounded text-xs">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const makhrajData = {
            jawf: { id: 'jawf', name: "Al-Jawf (Rongga)", letters: "ا , و , ي", desc: "Rongga mulut dan kerongkong untuk huruf Mad.", color: 0x60a5fa, pos: [-1.0, 0.5, 0] },
            halq: { id: 'halq', name: "Al-Halq (Kerongkong)", letters: "ء, ه, ع, ح, غ, خ", desc: "Bahagian tekak/kerongkong (Pangkal, Tengah, Hujung).", color: 0xf87171, pos: [-0.3, -2.5, 0] },
            lisan: { id: 'lisan', name: "Al-Lisan (Lidah)", letters: "ق, ك, ج, ش, ي, ض, ل, ...", desc: "Bahagian lidah yang menyentuh lelangit atau gigi.", color: 0x4ade80, pos: [-1.8, -0.4, 0] },
            syafatain: { id: 'syafatain', name: "Ash-Syafatain (Bibir)", letters: "ف, و, ب, م", desc: "Penyebutan menggunakan dua bibir.", color: 0xfacc15, pos: [-3.8, 0.15, 0] },
            khaisyum: { id: 'khaisyum', name: "Al-Khaisyum (Hidung)", letters: "Ghunnah (Dengung)", desc: "Suara dengung dari pangkal hidung (Nun & Mim).", color: 0xc084fc, pos: [-1.8, 2.0, 0] }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        function createCurve(points) {
            const curve = new THREE.CatmullRomCurve3(points);
            const geo = new THREE.TubeGeometry(curve, 64, 0.06, 8, false);
            const mat = new THREE.MeshPhongMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.4 });
            scene.add(new THREE.Mesh(geo, mat));
        }

        // Lukis Profil
        createCurve([new THREE.Vector3(0,5,0), new THREE.Vector3(-3.5,3,0), new THREE.Vector3(-4.5,1.5,0), new THREE.Vector3(-4,-1,0), new THREE.Vector3(-2,-6,0)]);
        createCurve([new THREE.Vector3(-3.7,0.8,0), new THREE.Vector3(-1,1.2,0), new THREE.Vector3(-0.5,-6,0)]);
        createCurve([new THREE.Vector3(-3.7,-0.2,0), new THREE.Vector3(-1,-1,0), new THREE.Vector3(-1.2,-6,0)]);
        createCurve([new THREE.Vector3(-3.7,2,0), new THREE.Vector3(-1,1.8,0), new THREE.Vector3(-0.5,0.5,0)]);

        const markers = [];
        Object.keys(makhrajData).forEach(key => {
            const d = makhrajData[key];
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.5 }));
            mesh.position.set(d.pos[0], d.pos[1], d.pos[2]);
            mesh.userData = d;
            scene.add(mesh);
            markers.push(mesh);
        });

        window.selectMakhraj = function(id) {
            const d = makhrajData[id];
            const panel = document.getElementById('info-panel');
            panel.classList.remove('hidden');
            document.getElementById('info-title').innerText = d.name;
            document.getElementById('info-letters').innerText = d.letters;
            document.getElementById('info-desc').innerText = d.desc;
            document.getElementById('info-color').style.backgroundColor = '#' + d.color.toString(16);
            
            camera.position.lerp(new THREE.Vector3(d.pos[0], d.pos[1], 8), 1);
            controls.target.set(d.pos[0], d.pos[1], d.pos[2]);
        };

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;
            markers.forEach((m, i) => {
                m.scale.setScalar(1 + Math.sin(time + i) * 0.1);
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
